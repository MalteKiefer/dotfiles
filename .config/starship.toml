# starship ‚ÄĒ Catppuccin Mocha (matched to waybar/labwc).

add_newline = true

format = """
[‚ē≠‚ĒÄ](blue) $os$username[ at ](overlay0)$hostname[ in ](overlay0)$directory$git_branch$git_status$git_state$package$nodejs$rust$python$golang$cmd_duration
[‚ēį‚ĒÄ‚ĚĮ](blue) $character"""

right_format = """$time$battery"""

palette = "mocha"

[palettes.mocha]
base       = "#1e1e2e"
mantle     = "#181825"
crust      = "#11111b"
surface0   = "#313244"
surface1   = "#45475a"
surface2   = "#585b70"
text       = "#cdd6f4"
subtext1   = "#bac2de"
subtext0   = "#a6adc8"
overlay2   = "#9399b2"
overlay1   = "#7f849c"
overlay0   = "#6c7086"
blue       = "#89b4fa"
lavender   = "#b4befe"
sapphire   = "#74c7ec"
sky        = "#89dceb"
teal       = "#94e2d5"
green      = "#a6e3a1"
yellow     = "#f9e2af"
peach      = "#fab387"
maroon     = "#eba0ac"
red        = "#f38ba8"
mauve      = "#cba6f7"
pink       = "#f5c2e7"
flamingo   = "#f2cdcd"
rosewater  = "#f5e0dc"

[character]
success_symbol = "[‚ĚĮ](bold blue)"
error_symbol = "[‚ĚĮ](bold red)"
vimcmd_symbol = "[‚Ěģ](bold teal)"

[os]
disabled = false
format = "[$symbol]($style)"
style = "bold blue"

[os.symbols]
Arch = " "
Linux = " "

[username]
style_user = "bold teal"
style_root = "bold red"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
ssh_symbol = "  "
format = "[$ssh_symbol$hostname](bold blue)"

[directory]
style = "bold yellow"
format = "[$path]($style)[$read_only]($read_only_style)"
read_only = "  "
read_only_style = "red"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = " "
style = "bold mauve"
format = "[ on ](overlay0)[$symbol$branch]($style)"

[git_status]
style = "red"
format = "[ \\[$all_status$ahead_behind\\]]($style)"
conflicted = "="
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "¬Ľ"
deleted = "‚úė"

[git_state]
format = "\\([$state( $progress_current/$progress_total)](bold yellow)\\) "

[package]
symbol = " "
style = "teal"
format = "[ $symbol$version]($style)"

[nodejs]
symbol = " "
style = "green"
format = "[ $symbol$version]($style)"

[rust]
symbol = " "
style = "peach"
format = "[ $symbol$version]($style)"

[python]
symbol = " "
style = "blue"
format = "[ $symbol$version( \\($virtualenv\\))]($style)"

[golang]
symbol = " "
style = "sapphire"
format = "[ $symbol$version]($style)"

[cmd_duration]
min_time = 1000
format = "[ took ](overlay0)[$duration](yellow)"

[time]
disabled = false
format = "[ $time](overlay0)"
time_format = "%H:%M:%S"
utc_time_offset = "local"

[battery]
disabled = false
format = "[ $symbol$percentage]($style)"
discharging_symbol = " "
charging_symbol = " "
full_symbol = " "

[[battery.display]]
threshold = 25
style = "red"

[[battery.display]]
threshold = 60
style = "yellow"

[[battery.display]]
threshold = 100
style = "green"

[memory_usage]
disabled = true

[shell]
disabled = true

[line_break]
disabled = false
