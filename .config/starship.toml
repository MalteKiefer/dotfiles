# starship — Catppuccin Mocha (matched to waybar/labwc).

add_newline = true

format = """
[╭─](#89b4fa) $os$username[ at ](#6c7086)$hostname[ in ](#6c7086)$directory$git_branch$git_status$git_state$package$nodejs$rust$python$golang$cmd_duration
[╰─❯](#89b4fa) $character"""

right_format = """$time$battery"""

palette = "mocha"

[palettes.mocha]
base       = "#1e1e2e"
mantle     = "#181825"
crust      = "#11111b"
surface0   = "#313244"
surface1   = "#45475a"
surface2   = "#585b70"
text       = "#cdd6f4"
subtext1   = "#bac2de"
subtext0   = "#a6adc8"
overlay2   = "#9399b2"
overlay1   = "#7f849c"
overlay0   = "#6c7086"
blue       = "#89b4fa"
lavender   = "#b4befe"
sapphire   = "#74c7ec"
sky        = "#89dceb"
teal       = "#94e2d5"
green      = "#a6e3a1"
yellow     = "#f9e2af"
peach      = "#fab387"
maroon     = "#eba0ac"
red        = "#f38ba8"
mauve      = "#cba6f7"
pink       = "#f5c2e7"
flamingo   = "#f2cdcd"
rosewater  = "#f5e0dc"

[character]
success_symbol = "[❯](bold #89b4fa)"
error_symbol = "[❯](bold #f38ba8)"
vimcmd_symbol = "[❮](bold #94e2d5)"

[os]
disabled = false
format = "[$symbol]($style)"
style = "bold #89b4fa"

[os.symbols]
Fedora = " "
Linux = " "
Arch = " "
Ubuntu = " "
Debian = " "
Macos = " "
Windows = " "

[username]
style_user = "bold #94e2d5"
style_root = "bold #f38ba8"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
ssh_symbol = "  "
format = "[$ssh_symbol$hostname](bold #89b4fa)"

[directory]
style = "bold #f9e2af"
format = "[$path]($style)[$read_only]($read_only_style)"
read_only = "  "
read_only_style = "#f38ba8"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "[ on ](#6c7086)[$symbol$branch]($style)"

[git_status]
style = "#f38ba8"
format = "[ \\[$all_status$ahead_behind\\]]($style)"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[git_state]
format = "\\([$state( $progress_current/$progress_total)](bold #f9e2af)\\) "

[package]
symbol = " "
style = "#94e2d5"
format = "[ $symbol$version]($style)"

[nodejs]
symbol = " "
style = "#a6e3a1"
format = "[ $symbol$version]($style)"

[rust]
symbol = " "
style = "#fab387"
format = "[ $symbol$version]($style)"

[python]
symbol = " "
style = "#89b4fa"
format = "[ $symbol$version( \\($virtualenv\\))]($style)"

[golang]
symbol = " "
style = "#74c7ec"
format = "[ $symbol$version]($style)"

[cmd_duration]
min_time = 1000
format = "[ took ](#6c7086)[$duration](#f9e2af)"

[time]
disabled = false
format = "[ $time](#6c7086)"
time_format = "%H:%M:%S"
utc_time_offset = "local"

[battery]
disabled = false
format = "[ $symbol$percentage]($style)"
discharging_symbol = " "
charging_symbol = " "
full_symbol = " "

[[battery.display]]
threshold = 25
style = "#f38ba8"

[[battery.display]]
threshold = 60
style = "#f9e2af"

[[battery.display]]
threshold = 100
style = "#a6e3a1"

[memory_usage]
disabled = true

[shell]
disabled = true

[line_break]
disabled = false
