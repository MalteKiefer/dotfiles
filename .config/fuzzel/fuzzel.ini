font=JetBrainsMono Nerd Font:weight=300:size=5
dpi-aware=yes
prompt=" "
icon-theme=Papirus-Dark
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
terminal=foot
layer=overlay
lines=12
width=40
horizontal-pad=16
vertical-pad=14
inner-pad=10
line-height=22
letter-spacing=0
tabs=4
show-actions=no
match-mode=fzf

[border]
width=1
radius=12

[colors]
background=1e1e2eee
text=cdd6f4ff
prompt=89b4faff
placeholder=a6adc8ff
input=cdd6f4ff
match=f9e2afff
selection=89b4faff
selection-text=1e1e2eff
selection-match=1e1e2eff
counter=a6adc8ff
border=45475aff

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace
delete-next=Delete
prev=Up Control+p
next=Down Control+n

[dmenu]
exit-immediately-if-empty=no
